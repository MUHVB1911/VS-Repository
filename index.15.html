<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Number Guessing Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #282c34;
      color: #f7f7f7;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .game {
      background: #333;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      width: 320px;
      text-align: center;
    }
    input {
      width: 80%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #555;
      margin: 12px 0;
      background: #1e2228;
      color: #fff;
    }
    button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #61dafb;
      color: #000;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #52c1ec;
    }
    .status {
      margin-top: 16px;
      min-height: 24px;
    }
  </style>
</head>
<body>
  <div class="game">
    <h1>Guess the Number</h1>
    <p>Pick a number between 1 and 20.</p>
    <input id="guessInput" type="number" min="1" max="20" placeholder="Your guess" />
    <button id="guessButton">Guess</button>
    <div class="status" id="statusText"></div>
    <p>Attempts: <span id="attempts">0</span></p>
    <button id="resetButton">Reset Game</button>
  </div>
  <script>
    const statusText = document.getElementById('statusText');
    const guessInput = document.getElementById('guessInput');
    const guessButton = document.getElementById('guessButton');
    const resetButton = document.getElementById('resetButton');
    const attemptsDisplay = document.getElementById('attempts');

    let secretNumber = Math.floor(Math.random() * 20) + 1;
    let attempts = 0;

    function updateStatus(message) {
      statusText.textContent = message;
    }

    function resetGame() {
      secretNumber = Math.floor(Math.random() * 20) + 1;
      attempts = 0;
      attemptsDisplay.textContent = attempts;
      guessInput.value = '';
      updateStatus('New game started. Make a guess!');
      guessInput.disabled = false;
      guessButton.disabled = false;
    }

    guessButton.addEventListener('click', () => {
      const guess = Number(guessInput.value);
      if (!guess || guess < 1 || guess > 20) {
        updateStatus('Enter a number between 1 and 20.');
        return;
      }
      attempts += 1;
      attemptsDisplay.textContent = attempts;
      if (guess === secretNumber) {
        updateStatus('Correct! You guessed the number.');
        guessInput.disabled = true;
        guessButton.disabled = true;
      } else if (guess > secretNumber) {
        updateStatus('Too high. Try again.');
      } else {
        updateStatus('Too low. Try again.');
      }
    });

    resetButton.addEventListener('click', resetGame);
    updateStatus('Guess the secret number to win.');
  </script>
</body>
</html>
