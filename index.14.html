<!DOCTYPE html>
<html lang="ar">
<head>
  <link rel="stylesheet" href="style.CSS">
<meta charset="UTF-8">
<title>Quiz Game</title>
</head>
<body>
  <center>

<h2 id="question">السؤال يظهر هنا</h2>

<div id="answers"></div>

<p id="score"></p>

<script>
// الأسئلة
const quiz = [
  {q: "عاصمة فرنسا ؟", a: ["باريس", "روما", "مدريد"], correct: 0},
  {q: "2 + 2 = ؟", a: ["3", "4", "5"], correct: 1},
  {q: "أكبر كوكب ؟", a: ["الأرض", "المريخ", "المشتري"], correct: 2},
  {q: "لون السماء ؟", a: ["أزرق", "أخضر", "أحمر"], correct: 0},
  {q: "عدد أيام الأسبوع ؟", a: ["5", "7", "10"], correct: 1},
  {q: "أسرع حيوان ؟", a: ["فهد", "أسد", "فيل"], correct: 0},
  {q: "لغة مصر ؟", a: ["إنجليزي", "عربي", "فرنسي"], correct: 1},
  {q: "5 × 5 = ؟", a: ["10", "20", "25"], correct: 2},
  {q: "كوكب نعيش عليه ؟", a: ["المريخ", "الأرض", "زحل"], correct: 1},
  {q: "لون الشمس ؟", a: ["أصفر", "أزرق", "أسود"], correct: 0}
];

let current = 0;
let score = 0;

// عرض السؤال
function showQuestion() {
  let q = quiz[current];
  document.getElementById("question").innerText = q.q;

  let answersHTML = "";
  q.a.forEach((ans, index) => {
    answersHTML += `<button onclick="checkAnswer(${index})">${ans}</button><br>`;
  });

  document.getElementById("answers").innerHTML = answersHTML;
}

// التحقق من الإجابة
function checkAnswer(index) {
  if (index === quiz[current].correct) {
    score++;
  }

  current++;

  if (current < quiz.length) {
    showQuestion();
  } else {
    document.getElementById("question").innerText = "انتهت اللعبة 🎉";
    document.getElementById("answers").innerHTML = "";
    document.getElementById("score").innerText = "درجتك: " + score + "/10";
  }
}

// تشغيل أول سؤال
showQuestion();
</script>
</center>
</body>
</html>
